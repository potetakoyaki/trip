<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Planner — 旅行プランメーカー</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  </head>
  <body>
    <button id="menu-btn" class="menu-btn" aria-label="メニュー">☰</button>

    <aside id="drawer" class="drawer hidden" aria-label="メニュー">
      <div class="drawer-head">
        <h2>☰ メニュー</h2>
        <button id="drawer-close" class="drawer-close" aria-label="閉じる">✕</button>
      </div>

      <details class="drawer-section" id="sec-history">
        <summary>📚 保存したプラン<span class="sec-count" id="history-count"></span></summary>
        <div class="drawer-sec-body">
          <div class="sec-actions">
            <button type="button" id="history-refresh" class="btn-ghost">更新</button>
          </div>
          <div id="history-list" class="history-list"></div>
        </div>
      </details>

      <details class="drawer-section" id="sec-wish">
        <summary>⭐ 行ってみたい<span class="sec-count" id="wish-count"></span></summary>
        <div class="drawer-sec-body">
          <p class="sec-hint">↑↓ で行きたい順に並び替えできます。</p>
          <button type="button" id="wish-plan-btn" class="btn-secondary">⭐ 行きたいリストでプランを作成</button>
          <div id="wishlist-list" class="wishlist-list"></div>
        </div>
      </details>

      <details class="drawer-section" id="sec-visited">
        <summary>📍 行った場所<span class="sec-count" id="visited-count"></span></summary>
        <div class="drawer-sec-body">
          <div id="visited-tree" class="visited-tree"></div>
        </div>
      </details>
    </aside>
    <div id="drawer-overlay" class="drawer-overlay hidden"></div>

    <header class="hero">
      <div class="hero-inner">
        <div class="hero-badge">🧳 Trip Planner</div>
        <h1>旅行プランを、自動で。</h1>
        <p>行き先と日付を入れるだけ。</p>
      </div>
    </header>

    <main>
      <section class="card form-card">
        <form id="plan-form">
          <div class="field">
            <label for="area">エリア・行き先</label>
            <input type="text" id="area" placeholder="例: 箱根 / 京都 / 神奈川県" autocomplete="off" required />
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="origin">出発地点</label>
              <input type="text" id="origin" placeholder="例: 新宿 / 東京駅 / 名古屋" autocomplete="off" />
            </div>
            <div class="field">
              <label for="transport">移動手段</label>
              <select id="transport">
                <option value="">指定なし</option>
                <option value="電車">電車</option>
                <option value="新幹線">新幹線</option>
                <option value="車">車</option>
                <option value="飛行機">飛行機</option>
                <option value="高速バス">高速バス</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="startDate">開始日</label>
              <input type="date" id="startDate" required />
            </div>
            <div class="field">
              <label for="endDate">終了日</label>
              <input type="date" id="endDate" required />
            </div>
          </div>

          <div class="field">
            <label>興味（複数選択可）</label>
            <div id="interests" class="chips"></div>
          </div>

          <div class="field">
            <label for="keyword">キーワード検索（やりたいこと・任意）</label>
            <input type="text" id="keyword" placeholder="例: 花火 / 紅葉 / 美術館 / 海鮮" autocomplete="off" />
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="budget">予算の目安（円 / 1人）</label>
              <input type="number" id="budget" min="0" step="1000" placeholder="例: 20000" />
            </div>
            <div class="field">
              <label for="pace">ペース</label>
              <select id="pace">
                <option value="relaxed">ゆったり（1日2件）</option>
                <option value="normal" selected>普通（1日3件）</option>
                <option value="packed">詰め込み（1日4件）</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>ホテルの希望（任意・一般的な条件）</label>
            <div class="checks">
              <label class="check"><input type="checkbox" class="hotel-feat" value="朝食付き" /> 朝食付き</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="夕食付き" /> 夕食付き</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="温泉" /> 温泉</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="大浴場" /> 大浴場</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="露天風呂" /> 露天風呂</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="駐車場" /> 駐車場</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="禁煙" /> 禁煙</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="駅近" /> 駅近</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="Wi-Fi" /> Wi-Fi無料</label>
              <label class="check"><input type="checkbox" class="hotel-feat" value="送迎" /> 送迎あり</label>
            </div>
          </div>

          <div class="field">
            <label>条件で提案を変える（お好みで）</label>
            <div class="grid-3">
              <select id="weather" aria-label="天気">
                <option value="any">天気: 指定なし</option>
                <option value="sunny">天気: 晴れ ☀️</option>
                <option value="rainy">天気: 雨 ☔</option>
              </select>
              <select id="companions" aria-label="同行者">
                <option value="">同行者: 指定なし</option>
                <option value="ひとり">同行者: ひとり</option>
                <option value="カップル">同行者: カップル</option>
                <option value="家族">同行者: 家族</option>
                <option value="友人">同行者: 友人</option>
              </select>
              <select id="vibe" aria-label="テーマ">
                <option value="">テーマ: おまかせ</option>
                <option value="定番">テーマ: 定番</option>
                <option value="穴場">テーマ: 穴場</option>
                <option value="グルメ重視">テーマ: グルメ重視</option>
                <option value="のんびり">テーマ: のんびり</option>
                <option value="アクティブ">テーマ: アクティブ</option>
              </select>
            </div>
          </div>

          <div class="options">
            <label class="switch">
              <input type="checkbox" id="thorough" />
              <span>🔍 じっくりモード（高性能AIで丁寧に作成・無料枠を多めに使用）</span>
            </label>
          </div>

          <button type="submit" class="btn-primary" id="submit-btn">
            <span class="btn-label">プランを作成する</span>
          </button>

          <button type="button" class="btn-secondary" id="collect-btn">🔬 じっくり収集（バックグラウンド・数分／画面を閉じてもOK）</button>

          <p class="hint">
            💡 登録は不要です。エリアを入れて作成すると、アプリが自動で情報を集めてプラン化します（初回は数十秒かかることがあります）。
          </p>
        </form>
        <div id="collect-progress" class="collect-progress hidden">
          <div class="cp-head">
            <span id="cp-label"></span>
            <span id="cp-count"></span>
          </div>
          <div class="cp-track"><div id="cp-fill" class="cp-fill"></div></div>
          <button type="button" id="cancel-btn" class="btn-cancel hidden">✕ キャンセル</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section id="result" class="card result-card hidden">
        <div class="result-head">
          <h2 class="section-title">あなたの旅行プラン</h2>
          <div class="result-actions">
            <button type="button" id="save-btn" class="btn-ghost hidden">💾 このプランを保存</button>
            <button type="button" id="print-btn" class="btn-ghost hidden">🖨 印刷・PDF</button>
            <button type="button" id="share-btn" class="btn-ghost hidden">🔗 リンクをコピー</button>
          </div>
        </div>
        <div id="plan-summary"></div>
        <div id="plan-eval"></div>
        <div id="plan-map" class="plan-map hidden no-print"></div>
        <div id="plan-days" class="timeline"></div>

        <div id="refine-box" class="refine-box hidden no-print">
          <label for="refine-input">🔁 AIに調整を頼む（例：グルメ多めに / もっとゆっくり / 2日目は温泉中心に）</label>
          <div class="refine-row">
            <input type="text" id="refine-input" placeholder="変えたいことを入力" autocomplete="off" />
            <button type="button" id="refine-btn" class="btn-secondary">この内容で作り直す</button>
          </div>
          <button type="button" id="variant-btn" class="btn-ghost">🔀 別案を出す</button>
        </div>

        <div id="plan-extra"></div>
      </section>
    </main>

    <footer>
      <p>Powered by Cloudflare Workers · Hono · D1 · Workers AI</p>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
