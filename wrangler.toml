name = "trip"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# 静的フロントエンド（public/）を配信。/api/* 以外のパスはここから返り、
# マッチしないリクエストだけが Worker (Hono) に渡る。
[assets]
directory = "./public"

# D1 データベース。`npm run db:create` で作成後、出力された database_id を貼る。
[[d1_databases]]
binding = "DB"
database_name = "trip"
database_id = "6a1f49ca-9a8f-4a71-a9e9-4c4837d39cf5"
migrations_dir = "migrations"

# Cron。毎分: じっくり収集キューを1ラウンド進める / 6時間ごと: 設定ソースの定期取得。
[triggers]
crons = ["0 */6 * * *", "* * * * *"]

# Workers AI（任意）。プラン生成を AI に切り替えたい場合に使う。無料枠あり。
# 標準はルールベース生成なので、この binding が無くても動作する。
[ai]
binding = "AI"

[vars]
# bot として送る User-Agent。連絡先を入れておくと相手サイトに親切。
USER_AGENT = "TripPlannerBot/0.1 (personal use)"

# --- シークレット（コミットしない） ---
# 公式APIを使う場合は wrangler secret で設定する:
#   wrangler secret put RAKUTEN_APP_ID
#   wrangler secret put CONNPASS_API_KEY
# ローカル開発では .dev.vars に書く（.dev.vars.example を参照）。
#
# Google Gemini を使う場合（Cloudflareのニューロン枠に依存せず、無料枠で高品質）:
#   wrangler secret put GEMINI_API_KEY     # https://aistudio.google.com/apikey で無料取得
#   （任意）GEMINI_MODEL を [vars] か secret で指定。未指定は gemini-2.0-flash。
# 設定するとスポット抽出・プラン生成が Gemini になり、未設定時は Workers AI を使う。
